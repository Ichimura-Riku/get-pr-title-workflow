name: Deploy Check

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  check_pr_info:
    name: Check PR Info
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Debug info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== github.sha ==="
          echo "${{ github.sha }}"
          echo ""
          echo "=== merge commit message ==="
          git log -1 --format=%s
          echo ""
          echo "=== gh pr list --search with SHA ==="
          gh pr list --search "${{ github.sha }}" --state merged --limit 5 --json number,title,url || echo "search failed"
          echo ""
          echo "=== gh pr list recent merged ==="
          gh pr list --state merged --limit 3 --json number,title,url
