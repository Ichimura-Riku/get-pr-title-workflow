name: Deploy Check

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  check_pr_info:
    name: Check PR Info
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get merged PR info
        id: pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].title')
          PR_URL=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].html_url')
          echo "title=${PR_TITLE:-N/A}" >> $GITHUB_OUTPUT
          echo "url=${PR_URL:-}" >> $GITHUB_OUTPUT

      - name: Output PR info
        run: |
          echo "PR Title: ${{ steps.pr_info.outputs.title }}"
          echo "PR URL: ${{ steps.pr_info.outputs.url }}"
