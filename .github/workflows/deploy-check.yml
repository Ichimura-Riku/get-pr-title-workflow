name: Deploy Check

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  check_pr_info:
    name: Check PR Info
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get merged PR info from commit
        id: pr_info
        run: |
          # マージコミットの subject から PR 番号を抽出
          # 例: "Merge pull request #4 from user/branch" → "4"
          PR_NUMBER=$(git log -1 --format=%s | grep -oE '#[0-9]+' | head -1 | tr -d '#')

          # マージコミットの body が PR タイトル
          PR_TITLE=$(git log -1 --format=%b)

          if [ -n "$PR_NUMBER" ]; then
            PR_URL="https://github.com/${{ github.repository }}/pull/${PR_NUMBER}"
          else
            PR_URL=""
          fi

          echo "title=${PR_TITLE:-N/A}" >> $GITHUB_OUTPUT
          echo "url=${PR_URL:-}" >> $GITHUB_OUTPUT

      - name: Output PR info
        run: |
          echo "PR Title: ${{ steps.pr_info.outputs.title }}"
          echo "PR URL: ${{ steps.pr_info.outputs.url }}"
